keel:
  engine: ${KEEL_ENGINE:codex}
  llm:
    provider: ${KEEL_LLM_PROVIDER:openai}
    api-key: ${KEEL_LLM_API_KEY:}
    model: ${KEEL_LLM_MODEL:codex-mini-latest}
    base-url: ${KEEL_LLM_BASE_URL:}
    repo-path: ${KEEL_REPO_PATH:}
    repos:
      - tag: "1С"
        path: ${KEEL_REPO_1C:}
        order: 1
      - tag: "API"
        path: ${KEEL_REPO_API:}
        order: 2
      - tag: "Фронт"
        path: ${KEEL_REPO_FRONT:}
        order: 3
  tracker:
    enabled: ${KEEL_TRACKER_ENABLED:false}
    token: ${KEEL_TRACKER_TOKEN:}
    org-id: ${KEEL_TRACKER_ORG_ID:}
    queue: ${KEEL_TRACKER_QUEUE:TRACKER}
    org-type: ${KEEL_TRACKER_ORG_TYPE:cloud}
  codex:
    command:
      - codex
      - exec
      - "-"
    repo-path: ${KEEL_REPO_PATH:/home/margleb/projects/ranhigs/www}

spring:
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB
  datasource:
    url: jdbc:h2:file:./data/keel;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
