keel:
  engine: codex
  tracker:
    enabled: ${KEEL_TRACKER_ENABLED:false}
    token: ${KEEL_TRACKER_TOKEN:}
    org-id: ${KEEL_TRACKER_ORG_ID:}
    queue: ${KEEL_TRACKER_QUEUE:TRACKER}
    org-type: ${KEEL_TRACKER_ORG_TYPE:cloud}
  codex:
    command:
      - codex
      - exec
      - "-"
    repo-path: ${KEEL_REPO_PATH:/home/margleb/projects/ranhigs/www}

spring:
  datasource:
    url: jdbc:h2:file:./data/keel;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
