<!-- Keel — смотрелка (шаг 1). Положить в src/main/resources/static/index.html.
     Открывается на http://localhost:8080/ , ходит в POST /api/decompose того же приложения. -->
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keel — разбор требования</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --paper: #EFF2EF;
            --surface: #FFFFFF;
            --surface-2: #F6F8F6;
            --ink: #16282A;
            --ink-soft: #56666A;
            --ink-faint: #8A9A98;
            --keel: #0E5A57;
            --keel-deep: #093F3C;
            --keel-tint: #DCEAE7;
            --amber: #A85E16;
            --amber-tint: #F4E6D4;
            --err: #A33;
            --code-bg: #EBF0EE;
            --code-ink: #37514E;
            --line: #D7DEDB;
            --line-strong: #C3CCC8;
            --sans: 'IBM Plex Sans', system-ui, sans-serif;
            --mono: 'IBM Plex Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased
        }

        button {
            font-family: inherit;
            cursor: pointer
        }

        :focus-visible {
            outline: 2px solid var(--keel);
            outline-offset: 2px;
            border-radius: 4px
        }

        textarea {
            font-family: inherit;
            font-size: 15px;
            color: var(--ink);
            border: 1px solid var(--line-strong);
            border-radius: 9px;
            padding: 12px 14px;
            width: 100%;
            background: var(--surface);
            line-height: 1.6;
            resize: vertical;
            min-height: 120px
        }

        textarea:focus {
            border-color: var(--keel);
            outline: none
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 24px;
            background: rgba(239, 242, 239, .9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--line);
            flex-wrap: wrap
        }

        .word {
            font-family: var(--mono);
            font-weight: 500;
            letter-spacing: .3em;
            font-size: 16px;
            color: var(--keel-deep)
        }

        .tag-top {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .spacer {
            flex: 1
        }

        .seg {
            display: inline-flex;
            border: 1px solid var(--line-strong);
            border-radius: 99px;
            overflow: hidden;
            background: var(--surface)
        }

        .seg button {
            border: 0;
            background: transparent;
            padding: 6px 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-soft)
        }

        .seg button.on {
            background: var(--ink);
            color: #fff
        }

        .btn {
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--ink);
            padding: 9px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: .12s
        }

        .btn:hover {
            border-color: var(--keel)
        }

        .btn:disabled {
            color: var(--ink-faint);
            cursor: not-allowed;
            background: var(--surface-2)
        }

        .btn-primary {
            background: var(--keel);
            border-color: var(--keel);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--keel-deep)
        }

        .btn-primary:disabled {
            background: var(--surface-2);
            border-color: var(--line);
            color: var(--ink-faint)
        }

        .soon {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: .05em;
            background: var(--surface-2);
            border: 1px solid var(--line);
            color: var(--ink-faint);
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: 2px
        }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 26px 26px 90px
        }

        .input-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 18px 20px
        }

        .input-card .lbl {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .13em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 9px
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 12px;
            flex-wrap: wrap
        }

        .input-row .hint {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--ink-faint)
        }

        .history {
            margin-top: 18px
        }

        .history h2 {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .13em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin: 0 0 10px;
            font-weight: 500;
            padding-left: 2px
        }

        .hist-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .hist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 11px 14px;
            cursor: pointer;
            text-align: left;
            width: 100%
        }

        .hist-item:hover {
            border-color: var(--keel)
        }

        .hist-item.active {
            border-color: var(--keel);
            background: var(--keel-tint)
        }

        .hist-item .h-req {
            flex: 1;
            font-size: 14px;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .hist-item .h-meta {
            flex: none;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .req-echo {
            font-size: 14px;
            color: var(--ink-soft);
            line-height: 1.55;
            margin-bottom: 11px;
            max-width: 760px
        }

        .state {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-soft)
        }

        .state.on {
            display: block
        }

        .spin {
            width: 26px;
            height: 26px;
            border: 3px solid var(--keel-tint);
            border-top-color: var(--keel);
            border-radius: 50%;
            animation: sp .7s linear infinite;
            margin: 0 auto 16px
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        .state .msg {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--keel-deep)
        }

        .snippet {
            max-width: 460px;
            margin: 0 auto 18px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 10px 14px;
            text-align: left;
            line-height: 1.5
        }

        .snippet .cap {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            display: block;
            margin-bottom: 4px
        }

        .snippet .txt {
            font-size: 13.5px;
            color: var(--ink-soft)
        }

        .bar {
            height: 4px;
            width: 320px;
            max-width: 80%;
            background: var(--keel-tint);
            border-radius: 99px;
            overflow: hidden;
            margin: 0 auto 16px
        }

        .bar i {
            display: block;
            height: 100%;
            width: 38%;
            background: var(--keel);
            border-radius: 99px;
            animation: slide 1.3s ease-in-out infinite
        }

        @keyframes slide {
            0% {
                transform: translateX(-110%)
            }

            100% {
                transform: translateX(320%)
            }
        }

        .elapsed {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--ink-faint);
            margin-top: 10px
        }

        .state .note {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint);
            margin-top: 6px
        }

        .error {
            color: var(--err);
            font-family: var(--mono);
            font-size: 13px;
            white-space: pre-wrap
        }

        .results {
            display: none
        }

        .results.on {
            display: block
        }

        .context {
            margin: 30px 2px 4px
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--ink-faint)
        }

        .context h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -.01em;
            margin: 6px 0 11px
        }

        .meta {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--ink-soft);
            line-height: 1.9
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-top: 18px
        }

        @media(max-width:920px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        .deck {
            position: relative;
            padding-left: 52px
        }

        .spine {
            position: absolute;
            left: 24px;
            top: 14px;
            bottom: 24px;
            width: 2px;
            background: var(--line-strong)
        }

        .stage {
            position: relative;
            margin-bottom: 28px
        }

        .node {
            position: absolute;
            left: -44px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--keel);
            color: var(--keel-deep);
            font-family: var(--mono);
            font-weight: 500;
            font-size: 12.5px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .stage-head {
            display: flex;
            align-items: center;
            gap: 11px;
            margin: 0 0 13px
        }

        .stage-title {
            font-size: 17px;
            font-weight: 600
        }

        .stage-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .task {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 11px;
            margin-bottom: 9px;
            transition: .12s
        }

        .task:hover {
            border-color: var(--line-strong)
        }

        .thead {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            cursor: pointer
        }

        .chip {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            min-width: 24px;
            height: 22px;
            padding: 0 6px;
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            border: 1px solid transparent
        }

        .chip.S {
            background: var(--keel-tint);
            color: var(--keel-deep)
        }

        .chip.M {
            background: var(--surface-2);
            color: var(--ink-soft);
            border-color: var(--line)
        }

        .chip.L {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .ttl {
            flex: 1;
            font-weight: 500
        }

        .chev {
            color: var(--ink-faint);
            font-family: var(--mono);
            transition: transform .15s
        }

        .task.open .chev {
            transform: rotate(90deg)
        }

        .body {
            display: none;
            padding: 0 15px 16px;
            border-top: 1px solid var(--line)
        }

        .task.open .body {
            display: block
        }

        .lay {
            margin-top: 14px
        }

        .lay-label {
            font-family: var(--mono);
            font-size: 10.5px;
            letter-spacing: .13em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 6px
        }

        .desc {
            font-size: 15px;
            line-height: 1.66
        }

        .cons {
            list-style: none;
            margin: 0;
            padding: 0
        }

        .cons li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 6px;
            color: var(--ink-soft);
            font-size: 14.5px
        }

        .cons li::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 9px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--amber)
        }

        .dev-toggle {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 16px;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--code-ink);
            background: var(--code-bg);
            border: 1px solid var(--line);
            padding: 6px 11px;
            border-radius: 7px
        }

        .dev-toggle:hover {
            border-color: var(--line-strong)
        }

        body.analyst .dev-toggle {
            display: none
        }

        .dev {
            display: none;
            margin-top: 10px;
            background: var(--code-bg);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 11px 13px
        }

        .task.dev-open .dev {
            display: block
        }

        body.analyst .dev {
            display: none !important
        }

        .dev code {
            display: block;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--code-ink);
            line-height: 1.7;
            margin-bottom: 5px;
            word-break: break-word
        }

        .dev code:last-child {
            margin-bottom: 0
        }

        .rail {
            position: sticky;
            top: 74px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        @media(max-width:920px) {
            .rail {
                position: static
            }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 11px;
            padding: 15px 16px
        }

        .panel h2 {
            font-size: 12px;
            font-family: var(--mono);
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin: 0 0 11px;
            font-weight: 500
        }

        .risk {
            display: flex;
            gap: 9px;
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.5;
            margin-bottom: 10px
        }

        .risk:last-child {
            margin-bottom: 0
        }

        .risk span {
            flex: none;
            color: var(--amber);
            font-family: var(--mono);
            margin-top: 1px
        }

        @media(prefers-reduced-motion:reduce) {
            * {
                transition: none !important
            }

            .spin {
                animation: none
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <span class="word">KEEL</span><span class="tag-top">разбор, привязанный к коду</span>
        <div class="spacer"></div>
        <div class="seg" id="viewSeg"><button data-v="full" class="on">код-слой</button><button data-v="analyst">для
                аналитика</button></div>
        <button class="btn btn-primary" disabled title="скоро">Залить в трекер<span class="soon">скоро</span></button>
    </header>

    <div class="wrap">
        <div class="input-card">
            <div class="lbl">требование</div>
            <textarea id="reqInput"
                placeholder="Вставьте текст требования. Если к нему есть документ — вставьте сюда и его содержимое."></textarea>
            <div class="input-row">
                <span class="hint">грунтовка: репозиторий из конфигурации сервера</span>
                <button class="btn btn-primary" id="runBtn">Разобрать</button>
            </div>
        </div>

        <div class="history" id="history" style="display:none">
            <h2>Прошлые разборы</h2>
            <div class="hist-list" id="histList"></div>
        </div>

        <div class="state" id="loading">
            <div class="snippet"><span class="cap">анализирую требование</span><span class="txt" id="loadSnip"></span>
            </div>
            <div class="bar"><i></i></div>
            <div class="msg" id="loadMsg">Перечитываю код…</div>
            <div class="elapsed" id="loadElapsed">0:00</div>
            <div class="note">обычно занимает 1–2 минуты — оставайся на этой странице</div>
        </div>
        <div class="state" id="errBox">
            <div class="error" id="errMsg"></div>
        </div>

        <div class="results" id="results">
            <div class="context">
                <div class="eyebrow" id="ctxEyebrow">разбор</div>
                <h1>Сегментированное требование</h1>
                <div class="req-echo" id="reqEcho"></div>
                <div class="meta" id="metaLine"></div>
            </div>
            <div class="grid">
                <div class="deck">
                    <div class="spine"></div>
                    <div id="deck"></div>
                </div>
                <aside class="rail">
                    <div class="panel">
                        <h2>Сквозные риски</h2>
                        <div id="risks"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const esc = s => ('' + (s ?? '')).replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const pad = n => String(n).padStart(2, '0');
        const sizeOf = s => { const u = ('' + (s || 'M')).toUpperCase(); return ['S', 'M', 'L'].includes(u) ? u : 'M'; };

        $('runBtn').onclick = async () => {
            const req = $('reqInput').value.trim();
            if (!req) { $('reqInput').focus(); return; }
            show('loading'); $('results').classList.remove('on'); $('errBox').classList.remove('on');
            $('runBtn').disabled = true;
            const snip = req.replace(/\s+/g, ' ').trim();
            $('loadSnip').textContent = snip.slice(0, 180) + (snip.length > 180 ? '…' : '');
            const msgs = ['Перечитываю код репозитория…', 'Понимаю существующую архитектуру…', 'Раскладываю по этапам и задачам…', 'Собираю риски и привязки к коду…'];
            let i = 0; $('loadMsg').textContent = msgs[0];
            const tick = setInterval(() => { i = (i + 1) % msgs.length; $('loadMsg').textContent = msgs[i]; }, 2500);
            const t0 = Date.now(); $('loadElapsed').textContent = '0:00';
            const clock = setInterval(() => { const s = Math.floor((Date.now() - t0) / 1000); $('loadElapsed').textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }, 1000);
            try {
                const r = await fetch('/api/decompose', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requirement: req }) });
                if (!r.ok) throw new Error('Сервер вернул ' + r.status + ' ' + r.statusText);
                const stored = await r.json();
                showStored(stored); loadList();
            } catch (e) {
                $('errMsg').textContent = 'Не получилось разобрать.\n' + e.message + '\n\nПроверь, что приложение запущено и движок настроен (keel.engine, repo-path).';
                show('errBox');
            } finally { clearInterval(tick); clearInterval(clock); $('runBtn').disabled = false; }
        };

        function show(which) { ['loading', 'errBox', 'results'].forEach(id => $(id).classList.toggle('on', id === which)); }

        function render(result) {
            const stages = Array.isArray(result && result.stages) ? result.stages : [];
            const risks = Array.isArray(result && result.integrationRisks) ? result.integrationRisks : [];
            let total = 0, sz = { S: 0, M: 0, L: 0 }, cons = 0;
            const deck = $('deck'); deck.innerHTML = '';
            stages.forEach((st, si) => {
                const items = Array.isArray(st.items) ? st.items : [];
                const el = document.createElement('div'); el.className = 'stage';
                let html = `<div class="node">${pad(si + 1)}</div><div class="stage-head"><div class="stage-title">${esc(st.title)}</div><div class="stage-count">${items.length} зад.</div></div>`;
                items.forEach(t => {
                    total++; const s = sizeOf(t.size); sz[s]++;
                    const cs = Array.isArray(t.considerations) ? t.considerations : []; cons += cs.length;
                    const dv = Array.isArray(t.devNotes) ? t.devNotes : [];
                    html += `<div class="task">
             <div class="thead"><span class="chip ${s}">${s}</span><span class="ttl">${esc(t.title)}</span><span class="chev">›</span></div>
             <div class="body">
               <div class="lay"><div class="lay-label">описание</div><div class="desc">${esc(t.description)}</div></div>
               ${cs.length ? `<div class="lay"><div class="lay-label">что учесть</div><ul class="cons">${cs.map(c => `<li>${esc(c)}</li>`).join('')}</ul></div>` : ''}
               ${dv.length ? `<button class="dev-toggle">⌄ для разработчика · ${dv.length}</button><div class="dev">${dv.map(d => `<code>${esc(d)}</code>`).join('')}</div>` : ''}
             </div></div>`;
                });
                el.innerHTML = html; deck.appendChild(el);
            });
            deck.querySelectorAll('.task').forEach(el => {
                el.querySelector('.thead').addEventListener('click', () => el.classList.toggle('open'));
                const dt = el.querySelector('.dev-toggle'); if (dt) dt.addEventListener('click', e => { e.stopPropagation(); el.classList.toggle('dev-open'); });
            });
            $('risks').innerHTML = risks.length ? risks.map(r => `<div class="risk"><span>!</span><div>${esc(r)}</div></div>`).join('') : '<div class="risk"><div style="color:var(--ink-faint)">рисков не выделено</div></div>';
            $('metaLine').innerHTML = `${stages.length} этапов&nbsp;·&nbsp;${total} задач&nbsp;·&nbsp;S ${sz.S} / M ${sz.M} / L ${sz.L}&nbsp;·&nbsp;«что учесть»: ${cons}`;
        }

        let currentId = null;
        function fmtDate(iso) { try { return new Date(iso).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; } }
        function markActive() { document.querySelectorAll('.hist-item').forEach(b => b.classList.toggle('active', Number(b.dataset.id) === currentId)); }

        function showStored(stored, push) {
            currentId = stored.id;
            $('ctxEyebrow').textContent = 'разбор #' + stored.id + (stored.createdAt ? ' · ' + fmtDate(stored.createdAt) : '');
            const req = (stored.requirement || '').replace(/\s+/g, ' ').trim();
            $('reqEcho').textContent = req.slice(0, 240) + (req.length > 240 ? '…' : '');
            render(stored.result || {});
            show('results'); markActive();
            if (push !== false) { try { history.pushState({ id: stored.id }, '', '?id=' + stored.id); } catch (e) { } }
        }

        async function loadList() {
            try {
                const r = await fetch('/api/decompositions'); if (!r.ok) return;
                const list = await r.json(); const box = $('histList');
                if (!Array.isArray(list) || !list.length) { $('history').style.display = 'none'; return; }
                $('history').style.display = '';
                box.innerHTML = list.map(it => '<button class="hist-item" data-id="' + it.id + '"><span class="h-req">' + esc(it.requirementPreview || '(без текста)') + '</span><span class="h-meta">' + (it.taskCount || 0) + ' зад. · ' + fmtDate(it.createdAt) + '</span></button>').join('');
                box.querySelectorAll('.hist-item').forEach(b => b.onclick = () => openId(Number(b.dataset.id)));
                markActive();
            } catch (e) { }
        }

        async function openId(id, push) {
            show('loading'); $('loadSnip').textContent = 'Открываю сохранённый разбор #' + id; $('loadMsg').textContent = 'Загружаю из базы…'; $('loadElapsed').textContent = '';
            try {
                const r = await fetch('/api/decompositions/' + id);
                if (r.status === 404) throw new Error('Разбор #' + id + ' не найден.');
                if (!r.ok) throw new Error('Сервер вернул ' + r.status);
                showStored(await r.json(), push);
            } catch (e) { $('errMsg').textContent = e.message; show('errBox'); }
        }

        window.addEventListener('popstate', () => { const id = new URLSearchParams(location.search).get('id'); if (id) { openId(Number(id), false); } else { currentId = null; show('home'); markActive(); } });

        loadList();
        (function () { const id = new URLSearchParams(location.search).get('id'); if (id) openId(Number(id), false); })();

        document.querySelectorAll('#viewSeg button').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('#viewSeg button').forEach(x => x.classList.remove('on'));
            b.classList.add('on'); document.body.classList.toggle('analyst', b.dataset.v === 'analyst');
        }));
    </script>
</body>

</html>
