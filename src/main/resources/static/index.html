<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keel — требования</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --paper: #EFF2EF;
            --surface: #FFFFFF;
            --surface-2: #F6F8F6;
            --ink: #16282A;
            --ink-soft: #56666A;
            --ink-faint: #8A9A98;
            --keel: #0E5A57;
            --keel-deep: #093F3C;
            --keel-tint: #DCEAE7;
            --amber: #A85E16;
            --amber-tint: #F4E6D4;
            --ok: #2E7D5B;
            --ok-tint: #DCEDE3;
            --err: #A33;
            --code-bg: #EBF0EE;
            --code-ink: #37514E;
            --line: #D7DEDB;
            --line-strong: #C3CCC8;
            --sans: 'IBM Plex Sans', system-ui, sans-serif;
            --mono: 'IBM Plex Mono', ui-monospace, monospace;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            margin: 0;
            height: 100%
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column
        }

        button {
            font-family: inherit;
            cursor: pointer
        }

        textarea,
        input {
            font-family: inherit;
            font-size: 15px;
            color: var(--ink)
        }

        :focus-visible {
            outline: 2px solid var(--keel);
            outline-offset: 2px;
            border-radius: 4px
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            flex-shrink: 0
        }

        .word {
            font-family: var(--mono);
            font-weight: 500;
            letter-spacing: .3em;
            font-size: 16px;
            color: var(--keel-deep)
        }

        .tag-top {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .spacer {
            flex: 1
        }

        .seg {
            display: inline-flex;
            border: 1px solid var(--line-strong);
            border-radius: 99px;
            overflow: hidden;
            background: var(--surface)
        }

        .seg button {
            border: 0;
            background: transparent;
            padding: 6px 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-soft)
        }

        .seg button.on {
            background: var(--ink);
            color: #fff
        }

        .btn {
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--ink);
            padding: 9px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: .12s
        }

        .btn:hover {
            border-color: var(--keel)
        }

        .btn:disabled {
            color: var(--ink-faint);
            cursor: not-allowed;
            background: var(--surface-2);
            border-color: var(--line)
        }

        .btn-primary {
            background: var(--keel);
            border-color: var(--keel);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--keel-deep)
        }

        .btn-sm {
            padding: 6px 11px;
            font-size: 13px
        }

        .shell {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .sidebar {
            width: 300px;
            flex-shrink: 0;
            border-right: 1px solid var(--line);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .main {
            flex: 1;
            overflow-y: auto;
            background: var(--paper)
        }

        .sb-head {
            padding: 14px 14px 8px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .sb-head h2 {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            margin: 0
        }

        .side-nav {
            padding: 0 6px 8px
        }

        .side-nav button {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            border-radius: 8px;
            padding: 9px 10px;
            text-align: left;
            color: var(--ink-soft);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer
        }

        .side-nav button:hover {
            background: var(--surface-2)
        }

        .side-nav button.active {
            background: var(--keel-tint);
            border-color: #C5DAD6;
            color: var(--keel-deep)
        }

        .req-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 12px
        }

        .req-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 10px 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 2px
        }

        .req-item:hover {
            background: var(--surface-2)
        }

        .req-item.active {
            background: var(--keel-tint);
            border-color: #C5DAD6
        }

        .ri-title {
            font-size: 13.5px;
            font-weight: 500;
            line-height: 1.4
        }

        .req-item.active .ri-title {
            color: var(--keel-deep)
        }

        .ri-meta {
            font-family: var(--mono);
            font-size: 10.5px;
            color: var(--ink-faint);
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            margin-top: 2px
        }

        .project-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 0 0 12px
        }

        .project-tag {
            background: var(--keel-tint);
            color: var(--keel-deep);
            border-radius: 99px;
            padding: 4px 8px;
            font-family: var(--mono);
            font-size: 11px
        }

        .badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 500
        }

        .badge-draft {
            background: var(--surface-2);
            color: var(--ink-faint);
            border: 1px solid var(--line)
        }

        .badge-decomposed {
            background: var(--keel-tint);
            color: var(--keel-deep)
        }

        .badge-pushed {
            background: var(--ok-tint);
            color: var(--ok)
        }

        .empty-list {
            padding: 20px 14px;
            text-align: center;
            color: var(--ink-faint);
            font-size: 13.5px
        }

        .new-req {
            border-top: 1px solid var(--line);
            padding: 12px 14px;
            background: var(--surface)
        }

        .new-req textarea,
        .new-req input {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: 7px;
            padding: 7px 10px;
            background: var(--surface-2);
            resize: none;
            display: block;
            margin-bottom: 7px;
            font-size: 13.5px
        }

        .new-req textarea:focus,
        .new-req input:focus {
            outline: none;
            border-color: var(--keel);
            background: var(--surface)
        }

        .new-req textarea {
            min-height: 72px
        }

        .image-import-row {
            display: flex;
            justify-content: flex-start;
            margin: 1px 0 9px
        }

        .attachment-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--keel-tint);
            color: var(--keel-deep);
            border-radius: 99px;
            padding: 5px 9px;
            font-family: var(--mono);
            font-size: 11px;
            margin: 0 7px 7px 0
        }

        .attachment-pill.error {
            background: #F5DADA;
            color: var(--err)
        }

        .attachment-remove {
            border: 0;
            background: transparent;
            color: currentColor;
            padding: 0 2px;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1
        }

        .mini-spin {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 2px solid currentColor;
            border-right-color: transparent;
            display: inline-block;
            animation: sp .8s linear infinite
        }

        .new-req-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13.5px;
            color: var(--keel-deep);
            font-weight: 500;
            cursor: pointer;
            padding: 4px 0;
            border: 0;
            background: transparent;
            width: 100%
        }

        .form-hidden {
            display: none
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
            text-align: center;
            color: var(--ink-soft)
        }

        .welcome .big {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px
        }

        .welcome h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 8px
        }

        .welcome p {
            font-size: 15px;
            max-width: 340px;
            margin: 0
        }

        .req-detail {
            padding: 26px 30px 60px;
            max-width: 1060px
        }

        .req-detail-head {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px
        }

        .req-detail-head h1 {
            flex: 1;
            font-size: 22px;
            font-weight: 600;
            margin: 0;
            line-height: 1.3
        }

        .req-body-text {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 15px 17px;
            font-size: 14.5px;
            line-height: 1.7;
            color: var(--ink-soft);
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word
        }

        .req-edit-form {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 15px 17px;
            margin-bottom: 18px
        }

        .req-edit-form input {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: 7px;
            padding: 7px 10px;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 9px;
            display: block
        }

        .req-edit-form textarea {
            width: 100%;
            border: 1px solid var(--line-strong);
            border-radius: 7px;
            padding: 7px 10px;
            font-size: 14.5px;
            resize: vertical;
            min-height: 110px;
            display: block
        }

        .req-edit-form input:focus,
        .req-edit-form textarea:focus {
            outline: none;
            border-color: var(--keel)
        }

        .req-edit-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 9px
        }

        .req-edit-form .image-import-row {
            margin-top: 9px;
            margin-bottom: 0
        }

        .project-picker {
            border: 1px solid var(--line);
            background: var(--surface-2);
            border-radius: 8px;
            padding: 10px 11px;
            margin-bottom: 12px
        }

        .project-picker-title {
            font-family: var(--mono);
            font-size: 10.5px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 8px
        }

        .project-option {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13.5px;
            color: var(--ink-soft);
            margin-bottom: 6px
        }

        .project-option:last-child {
            margin-bottom: 0
        }

        .project-option input {
            width: auto;
            margin: 0;
            display: inline-block
        }

        .project-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 7px;
            margin-bottom: 18px
        }

        .decompose-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .decompose-bar h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            flex: 1
        }

        .loading-box {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            margin-bottom: 18px
        }

        .spin {
            width: 20px;
            height: 20px;
            border: 3px solid var(--keel-tint);
            border-top-color: var(--keel);
            border-radius: 50%;
            animation: sp .7s linear infinite;
            margin: 0 auto 12px
        }

        @keyframes sp {
            to {
                transform: rotate(360deg)
            }
        }

        .loading-msg {
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--keel-deep);
            margin-bottom: 3px
        }

        .loading-elapsed {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .loading-snip {
            font-size: 13px;
            color: var(--ink-soft);
            font-style: italic;
            margin-bottom: 14px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto
        }

        .decomp-history {
            margin-bottom: 24px
        }

        .dh-label {
            font-family: var(--mono);
            font-size: 10.5px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 7px
        }

        .dh-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 12px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer
        }

        .dh-item:hover {
            border-color: var(--line-strong)
        }

        .dh-item.active {
            border-color: var(--keel);
            background: var(--keel-tint)
        }

        .dh-meta {
            flex: 1;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--ink-soft)
        }

        .dh-counts {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .result-wrap {
            display: grid;
            grid-template-columns: 1fr 268px;
            gap: 22px
        }

        @media(max-width:860px) {
            .result-wrap {
                grid-template-columns: 1fr
            }
        }

        .deck {
            position: relative;
            padding-left: 46px
        }

        .spine {
            position: absolute;
            left: 21px;
            top: 14px;
            bottom: 24px;
            width: 2px;
            background: var(--line-strong)
        }

        .stage {
            position: relative;
            margin-bottom: 22px
        }

        .node {
            position: absolute;
            left: -38px;
            width: 31px;
            height: 31px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--keel);
            color: var(--keel-deep);
            font-family: var(--mono);
            font-weight: 500;
            font-size: 11.5px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .stage-head {
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 10px
        }

        .stage-title {
            font-size: 15.5px;
            font-weight: 600
        }

        .stage-count {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--ink-faint)
        }

        .task {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 9px;
            margin-bottom: 7px
        }

        .task:hover {
            border-color: var(--line-strong)
        }

        .thead {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 13px;
            cursor: pointer
        }

        .chip {
            font-family: var(--mono);
            font-size: 10.5px;
            font-weight: 500;
            min-width: 21px;
            height: 19px;
            padding: 0 5px;
            flex: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            border: 1px solid transparent
        }

        .chip.S {
            background: var(--keel-tint);
            color: var(--keel-deep)
        }

        .chip.M {
            background: var(--surface-2);
            color: var(--ink-soft);
            border-color: var(--line)
        }

        .chip.L {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .confidence {
            font-family: var(--mono);
            font-size: 10px;
            height: 19px;
            padding: 0 6px;
            flex: none;
            display: flex;
            align-items: center;
            border-radius: 4px;
            border: 1px solid transparent
        }

        .confidence-high {
            background: var(--keel-tint);
            color: var(--ok)
        }

        .confidence-medium {
            background: var(--surface-2);
            color: var(--ink-faint);
            border-color: var(--line)
        }

        .confidence-low {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .ttl {
            flex: 1;
            font-weight: 500;
            font-size: 14px
        }

        .blocked-by {
            padding: 0 13px 9px;
            color: var(--ink-faint);
            font-size: 12px;
            line-height: 1.45
        }

        .chev {
            color: var(--ink-faint);
            font-family: var(--mono);
            transition: transform .15s;
            font-size: 12px
        }

        .task.open .chev {
            transform: rotate(90deg)
        }

        .tbody {
            display: none;
            padding: 0 13px 13px;
            border-top: 1px solid var(--line)
        }

        .task.open .tbody {
            display: block
        }

        .lay {
            margin-top: 11px
        }

        .lay-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 4px
        }

        .desc {
            font-size: 14px;
            line-height: 1.65
        }

        .cons {
            list-style: none;
            margin: 0;
            padding: 0
        }

        .cons li {
            position: relative;
            padding-left: 15px;
            margin-bottom: 5px;
            color: var(--ink-soft);
            font-size: 13.5px
        }

        .cons li::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 7px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--amber)
        }

        .cons.acceptance li::before {
            background: var(--ok)
        }

        .dev-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--code-ink);
            background: var(--code-bg);
            border: 1px solid var(--line);
            padding: 5px 9px;
            border-radius: 6px
        }

        .dev-toggle:hover {
            border-color: var(--line-strong)
        }

        body.analyst .dev-toggle {
            display: none
        }

        .dev {
            display: none;
            margin-top: 8px;
            background: var(--code-bg);
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 9px 11px
        }

        .task.dev-open .dev {
            display: block
        }

        body.analyst .dev {
            display: none !important
        }

        .dev code {
            display: block;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--code-ink);
            line-height: 1.65;
            margin-bottom: 3px;
            word-break: break-word
        }

        .dev-note {
            display: block;
            font-family: var(--mono);
            font-size: 11px;
            line-height: 1.65;
            margin-bottom: 5px;
            word-break: break-word
        }

        .dev-note:last-child {
            margin-bottom: 0
        }

        .dev-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
            margin-right: 4px;
            word-break: normal
        }

        .dev-badge-tech-one-c {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .dev-badge-tech-api {
            background: var(--keel-tint);
            color: var(--keel-deep)
        }

        .dev-badge-tech-front {
            background: #E8F0FE;
            color: #2952A3
        }

        .dev-badge-tech-db,
        .dev-badge-tech-other {
            background: var(--surface-2);
            color: var(--ink-soft)
        }

        .dev-badge-source-code {
            background: var(--ok-tint);
            color: var(--ok)
        }

        .dev-badge-source-guess {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .dev-note-body {
            color: var(--code-ink)
        }

        .result-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap
        }

        .result-filter button {
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--ink-soft);
            padding: 5px 12px;
            border-radius: 99px;
            font-family: var(--mono);
            font-size: 11px;
            cursor: pointer
        }

        .result-filter button.active {
            background: var(--keel);
            color: #fff;
            border-color: var(--keel)
        }

        .rail {
            position: sticky;
            top: 20px;
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 13px
        }

        @media(max-width:860px) {
            .rail {
                position: static
            }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 13px 14px
        }

        .panel h3 {
            font-size: 10.5px;
            font-family: var(--mono);
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin: 0 0 9px;
            font-weight: 500
        }

        .risk {
            display: flex;
            gap: 8px;
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.5;
            margin-bottom: 8px
        }

        .risk:last-child {
            margin-bottom: 0
        }

        .risk-icon {
            flex: none;
            color: var(--amber);
            font-family: var(--mono);
            margin-top: 1px
        }

        .risk-body {
            flex: 1
        }

        .risk-main {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap
        }

        .risk-severity {
            flex: none;
            font-family: var(--mono);
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 4px
        }

        .risk-severity-high {
            background: #F6DADA;
            color: var(--err)
        }

        .risk-severity-medium {
            background: var(--amber-tint);
            color: var(--amber)
        }

        .risk-severity-low {
            background: var(--surface-2);
            color: var(--ink-faint);
            border: 1px solid var(--line)
        }

        .risk-stages {
            color: var(--ink-faint);
            font-size: 12px;
            margin-top: 3px
        }

        .panel.attention {
            background: #FFF8F0;
            border-color: var(--amber-tint)
        }

        .panel.attention h3 {
            color: var(--amber)
        }

        .clarification {
            display: flex;
            gap: 8px;
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.5;
            margin-bottom: 8px
        }

        .clarification:last-child {
            margin-bottom: 0
        }

        .clarification-icon {
            flex: none;
            color: var(--amber);
            font-family: var(--mono);
            margin-top: 1px
        }

        .map {
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--ink-soft);
            line-height: 1.95
        }

        .map b {
            color: var(--keel-deep)
        }

        .scrim {
            position: fixed;
            inset: 0;
            background: rgba(16, 28, 30, .42);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 40;
            padding: 20px
        }

        .scrim.on {
            display: flex
        }

        .modal {
            background: var(--surface);
            border-radius: 13px;
            max-width: 400px;
            width: 100%;
            padding: 22px 22px 18px;
            border: 1px solid var(--line)
        }

        .modal h3 {
            margin: 0 0 5px;
            font-size: 17px;
            font-weight: 600
        }

        .modal p {
            margin: 0 0 13px;
            color: var(--ink-soft);
            font-size: 13.5px
        }

        .msum {
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 13px;
            font-family: var(--mono);
            font-size: 12.5px;
            line-height: 1.9;
            margin-bottom: 15px
        }

        .msum b {
            color: var(--keel-deep)
        }

        .mrow {
            display: flex;
            gap: 9px;
            justify-content: flex-end
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(18px);
            background: var(--ink);
            color: #fff;
            padding: 10px 17px;
            border-radius: 9px;
            font-size: 13.5px;
            opacity: 0;
            pointer-events: none;
            transition: .25s;
            z-index: 50;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .toast.on {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .toast .tm {
            color: #8FD3CC;
            font-size: 11.5px;
            font-family: var(--mono)
        }

        @media(prefers-reduced-motion:reduce) {
            * {
                transition: none !important
            }

            .spin {
                animation: none
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <span class="word">KEEL</span>
        <span class="tag-top">разбор требований</span>
        <div class="spacer"></div>
        <div class="seg" id="viewSeg">
            <button data-v="full" class="on">код-слой</button>
            <button data-v="analyst">для аналитика</button>
        </div>
        <button class="btn btn-primary" id="pushBtn" disabled>Залить в трекер</button>
    </header>
    <div class="shell">
        <aside class="sidebar">
            <div class="sb-head">
                <h2>Требования</h2>
            </div>
            <div class="side-nav">
                <button id="projectsNavBtn">Проекты</button>
            </div>
            <div class="req-list" id="reqList">
                <div class="empty-list">Загрузка…</div>
            </div>
            <div class="new-req">
                <button class="new-req-toggle" id="newReqBtn">＋ Новое требование</button>
            </div>
        </aside>
        <main class="main" id="main">
            <div class="welcome" id="welcome">
                <div class="big">⚓</div>
                <h2>Выберите требование</h2>
                <p>Выберите требование слева или создайте новое, чтобы начать декомпозицию.</p>
            </div>
        </main>
    </div>
    <div class="scrim" id="scrim">
        <div class="modal" role="dialog" aria-modal="true">
            <h3>Залить в Яндекс.Трекер</h3>
            <p>Создадим задачи по разбору. Это действие нельзя отменить.</p>
            <div class="msum" id="modalSum"></div>
            <div class="mrow"><button class="btn btn-sm" id="cancelPush">Отмена</button><button
                    class="btn btn-sm btn-primary" id="confirmPush">Создать задачи</button></div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const $ = id => document.getElementById(id);
        const esc = s => ('' + (s ?? '')).replace(/&/g, '&amp;').replace(/</g, '&lt;');
        const escAttr = s => esc(s).replace(/"/g, '&quot;');
        const pad = n => String(n).padStart(2, '0');
        const sizeOf = s => { const u = ('' + (s || 'M')).toUpperCase(); return ['S', 'M', 'L'].includes(u) ? u : 'M'; };
        const sizeConfidenceOf = v => { const c = ('' + (v || 'medium')).toLowerCase(); if (c === 'high') return { key: 'high', label: 'уверенно' }; if (c === 'low') return { key: 'low', label: 'неточно' }; return { key: 'medium', label: 'примерно' }; };
        const riskSeverityOf = v => { const s = ('' + (v || 'medium')).toLowerCase(); if (s === 'high') return { key: 'high', label: 'высокий' }; if (s === 'low') return { key: 'low', label: 'низкий' }; return { key: 'medium', label: 'средний' }; };
        const riskDescriptionOf = r => typeof r === 'string' ? r : (r?.description || '');
        const riskAffectedStagesOf = r => Array.isArray(r?.affectedStages) ? r.affectedStages : [];
        const fmtDate = iso => { try { return new Date(iso).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); } catch (e) { return ''; } };
        const showToast = (html, ms = 3200) => { const t = $('toast'); t.innerHTML = html; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), ms); };
        let state = { reqs: [], projects: [], activeReqId: null, activeDecompId: null, view: 'requirements' };
        async function loadProjectOptions() {
            try {
                const r = await fetch('/api/projects');
                const body = await r.json().catch(() => []);
                state.projects = r.ok && Array.isArray(body) ? body : [];
            } catch (e) {
                state.projects = [];
            }
            return state.projects;
        }
        function projectName(id) {
            const project = state.projects.find(p => Number(p.id) === Number(id));
            return project ? project.name : '#' + id;
        }
        function projectPickerHtml(selectedIds = []) {
            const selected = new Set((selectedIds || []).map(id => String(id)));
            const options = state.projects.length
                ? state.projects.map(p => '<label class="project-option"><input type="checkbox" value="' + escAttr(p.id) + '"' + (selected.has(String(p.id)) ? ' checked' : '') + '> <span>' + esc(p.name) + '</span></label>').join('')
                : '<div style="color:var(--ink-faint);font-size:13px">Проектов пока нет.</div>';
            return '<div class="project-picker"><div class="project-picker-title">Проекты (контекст для разбора)</div>' + options + '</div>';
        }
        function selectedProjectIds(containerId) {
            const container = $(containerId);
            if (!container) return [];
            return [...container.querySelectorAll('input[type="checkbox"]:checked')].map(input => Number(input.value));
        }
        function requirementProjectsHtml(projectIds = []) {
            const ids = Array.isArray(projectIds) ? projectIds : [];
            if (!ids.length) return '';
            return '<div class="project-tags">' + ids.map(id => '<span class="project-tag">' + esc(projectName(id)) + '</span>').join('') + '</div>';
        }
        function bindImageExtract(buttonId, inputId, textareaId) {
            const button = $(buttonId), input = $(inputId), textarea = $(textareaId);
            if (!button || !input || !textarea) return;
            button.onclick = () => input.click();
            input.onchange = () => uploadImageText(input, button, textarea);
        }
        async function uploadImageText(input, button, textarea) {
            const file = input.files && input.files[0];
            if (!file) return;
            const originalText = button.textContent;
            const formData = new FormData();
            formData.append('image', file);
            button.disabled = true;
            button.textContent = 'Читаю...';
            try {
                const r = await fetch('/api/extract-text', { method: 'POST', body: formData });
                const body = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(body.message || 'Не удалось извлечь текст.');
                textarea.value = body.text || '';
                textarea.focus();
            } catch (e) {
                alert('Не удалось прочитать скриншот:\n' + e.message);
            } finally {
                button.disabled = false;
                button.textContent = originalText;
                input.value = '';
            }
        }
        function parseDevNote(text) {
            const raw = '' + (text ?? '');
            const first = raw.match(/^\s*\[([^\]]+)\]\s*/);
            if (!first) return { techTag: null, sourceTag: null, body: raw };
            let body = raw.slice(first[0].length);
            const second = body.match(/^\s*\[([^\]]+)\]\s*/);
            if (!second) return { techTag: first[1].trim() || null, sourceTag: null, body };
            body = body.slice(second[0].length);
            return {
                techTag: first[1].trim() || null,
                sourceTag: second[1].trim() || null,
                body
            };
        }
        function devNoteTechClass(tag) {
            if (tag === '1С' || tag === '1C') return 'dev-badge-tech-one-c';
            if (tag === 'API') return 'dev-badge-tech-api';
            if (tag === 'Фронт') return 'dev-badge-tech-front';
            if (tag === 'БД') return 'dev-badge-tech-db';
            return 'dev-badge-tech-other';
        }
        function devNoteSourceClass(tag) {
            if (tag === 'из кода') return 'dev-badge-source-code';
            if (tag === 'предположение') return 'dev-badge-source-guess';
            return 'dev-badge-tech-other';
        }
        function renderDevBadge(tag, cls) {
            return tag ? '<span class="dev-badge ' + cls + '">[' + esc(tag) + ']</span>' : '';
        }
        function renderDevNote(text) {
            const note = parseDevNote(text);
            return '<div class="dev-note">'
                + renderDevBadge(note.techTag, devNoteTechClass(note.techTag))
                + renderDevBadge(note.sourceTag, devNoteSourceClass(note.sourceTag))
                + '<span class="dev-note-body">' + esc(note.body) + '</span></div>';
        }
        function statusBadge(s) {
            if (s === 'DECOMPOSED') return '<span class="badge badge-decomposed">разобрано</span>';
            if (s === 'PUSHED') return '<span class="badge badge-pushed">в трекере</span>';
            return '<span class="badge badge-draft">черновик</span>';
        }
        function renderSidebar() {
            const box = $('reqList');
            const projectNav = $('projectsNavBtn');
            if (projectNav) projectNav.classList.toggle('active', state.view === 'projects');
            if (!state.reqs.length) { box.innerHTML = '<div class="empty-list">Требований ещё нет.<br>Создайте первое ↓</div>'; return; }
            box.innerHTML = state.reqs.map(r => `<div class="req-item${state.view !== 'projects' && r.id === state.activeReqId ? ' active' : ''}" data-id="${r.id}"><div class="ri-title">${esc(r.title)}</div><div class="ri-meta">${statusBadge(r.status)}<span>${r.decompositionCount} разб.</span><span>${fmtDate(r.createdAt)}</span></div></div>`).join('');
            box.querySelectorAll('.req-item').forEach(el => el.onclick = () => openReq(+el.dataset.id));
        }
        async function loadReqs() {
            try { const r = await fetch('/api/requirements'); state.reqs = await r.json(); } catch (e) { state.reqs = []; }
            renderSidebar();
        }
        $('projectsNavBtn').onclick = () => openProjectsPage();
        $('newReqBtn').onclick = () => openNewRequirementForm();
        function renderWelcome() {
            state.view = 'requirements';
            $('main').innerHTML = '<div class="welcome" id="welcome"><div class="big">⚓</div><h2>Выберите требование</h2><p>Выберите требование слева или создайте новое, чтобы начать декомпозицию.</p></div>';
            renderSidebar();
        }
        async function openNewRequirementForm() {
            state.view = 'requirements';
            state.activeReqId = null;
            state.activeDecompId = null;
            $('pushBtn').disabled = true;
            renderSidebar();
            await loadProjectOptions();
            $('main').innerHTML = `
                <div class="req-detail" id="newReqDetail">
                  <div class="req-detail-head">
                    <h1>Новое требование</h1>
                  </div>
                  <div style="margin-bottom:16px">
                    <label style="display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px">Название</label>
                    <input id="newTitle" placeholder="Короткое название требования" maxlength="200" style="width:100%;border:1px solid var(--line-strong);border-radius:7px;padding:7px 10px;font-size:15px;font-weight:500;display:block">
                  </div>
                  <div style="margin-bottom:16px">
                    <label style="display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px">Текст требования</label>
                    <textarea id="newBody" placeholder="Вставьте текст требования, скопируйте из трекера или перетащите файл..." style="width:100%;min-height:300px;border:1px solid var(--line-strong);border-radius:7px;padding:7px 10px;font-size:14.5px;resize:vertical;display:block"></textarea>
                  </div>
                  <div id="newDropZone" style="border:2px dashed var(--line-strong);border-radius:10px;padding:24px;text-align:center;color:var(--ink-faint);font-size:14px;margin-bottom:20px;cursor:pointer;transition:.15s">
                    📎 Перетащите скриншоты или нажмите для выбора
                    <br>
                    <span style="font-family:var(--mono);font-size:11px">
                      PNG, JPG, WEBP до 5 МБ каждый
                    </span>
                    <input type="file" id="newImageInput" accept="image/*" multiple style="display:none">
                  </div>
                  <div id="newAttachments" style="margin-bottom:20px"></div>
                  <div id="newProjectPicker">${projectPickerHtml()}</div>
                  <div style="display:flex;gap:10px;justify-content:flex-end">
                    <button class="btn btn-sm" id="newCancelBtn">Отмена</button>
                    <button class="btn btn-sm btn-primary" id="newSaveBtn">Создать требование</button>
                  </div>
                </div>
            `;
            bindNewRequirementForm();
            $('newTitle').focus();
        }
        function bindNewRequirementForm() {
            const title = $('newTitle'), body = $('newBody'), dropZone = $('newDropZone'), input = $('newImageInput');
            dropZone.onclick = () => input.click();
            input.onchange = () => { addNewRequirementFiles(input.files); input.value = ''; };
            body.addEventListener('paste', e => {
                const files = [...(e.clipboardData?.items || [])]
                    .filter(item => item.kind === 'file' && item.type.startsWith('image/'))
                    .map(item => item.getAsFile())
                    .filter(Boolean);
                if (files.length) {
                    e.preventDefault();
                    addNewRequirementFiles(files);
                }
            });
            ['dragenter', 'dragover'].forEach(eventName => dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--keel)';
                dropZone.style.background = 'var(--keel-tint)';
            }));
            ['dragleave', 'drop'].forEach(eventName => dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                dropZone.style.borderColor = 'var(--line-strong)';
                dropZone.style.background = 'transparent';
            }));
            dropZone.addEventListener('drop', e => addNewRequirementFiles(e.dataTransfer.files));
            $('newCancelBtn').onclick = () => {
                if ((title.value.trim() || body.value.trim()) && !confirm('Есть несохранённые данные. Выйти?')) return;
                renderWelcome();
            };
            $('newSaveBtn').onclick = () => saveNewRequirement();
        }
        async function addNewRequirementFiles(files) {
            const imageFiles = [...(files || [])].filter(file => file.type.startsWith('image/'));
            await Promise.all(imageFiles.map(file => processNewRequirementFile(file)));
        }
        async function processNewRequirementFile(file) {
            const pill = renderNewAttachment(file);
            try {
                const text = await extractImageText(file);
                appendExtractedText($('newBody'), text);
                pill.querySelector('.mini-spin')?.remove();
                pill.querySelector('.attachment-status').textContent = 'готово';
            } catch (e) {
                pill.classList.add('error');
                pill.querySelector('.mini-spin')?.remove();
                pill.querySelector('.attachment-status').textContent = e.message;
            }
        }
        function renderNewAttachment(file) {
            const pill = document.createElement('span');
            pill.className = 'attachment-pill';
            pill.innerHTML = '<span class="mini-spin"></span><span>' + esc(file.name || 'скриншот') + '</span><span class="attachment-status">Читаю...</span><button type="button" class="attachment-remove" title="Удалить">×</button>';
            pill.querySelector('.attachment-remove').onclick = () => pill.remove();
            $('newAttachments').appendChild(pill);
            return pill;
        }
        async function extractImageText(file) {
            const formData = new FormData();
            formData.append('image', file);
            const r = await fetch('/api/extract-text', { method: 'POST', body: formData });
            const body = await r.json().catch(() => ({}));
            if (!r.ok) throw new Error(body.message || 'Не удалось извлечь текст.');
            return body.text || '';
        }
        function appendExtractedText(textarea, text) {
            const addition = (text || '').trim();
            if (!textarea || !addition) return;
            const current = textarea.value.trim();
            textarea.value = current ? textarea.value.replace(/\s*$/, '') + '\n\n---\n\n' + addition : addition;
        }
        async function saveNewRequirement() {
            const title = $('newTitle').value.trim(), body = $('newBody').value.trim();
            const projectIds = selectedProjectIds('newProjectPicker');
            if (!title || !body) { alert('Заполните название и текст.'); return; }
            try {
                const r = await fetch('/api/requirements', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, body, projectIds }) });
                const responseBody = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(responseBody.message || 'Ошибка сервера');
                const req = responseBody;
                await loadReqs(); openReq(req.id);
            } catch (e) { alert('Не удалось создать: ' + e.message); }
        }
        async function openReq(id) {
            state.view = 'requirements'; state.activeReqId = id; state.activeDecompId = null; $('pushBtn').disabled = true; renderSidebar();
            try {
                const [rd, dd] = await Promise.all([fetch('/api/requirements/' + id), fetch('/api/requirements/' + id + '/decompositions'), loadProjectOptions()]);
                const req = await rd.json(), decomps = await dd.json();
                renderReqDetail(req, decomps);
            } catch (e) { $('main').innerHTML = '<div class="welcome"><div class="big">⚠</div><h2>Ошибка загрузки</h2></div>'; }
        }
        function renderReqDetail(req, decomps) {
            const m = $('main');
            m.innerHTML = '<div class="req-detail" id="reqDetail"></div>';
            const d = $('reqDetail');
            d.innerHTML = `<div class="req-detail-head"><h1>${esc(req.title)} ${statusBadge(req.status)}</h1><button class="btn btn-sm" id="editBtn">Редактировать</button></div><div id="reqBodyWrap">${requirementProjectsHtml(req.projectIds)}<div class="req-body-text">${esc(req.body)}</div></div><div class="decompose-bar"><h2>Декомпозиция</h2><button class="btn btn-sm btn-primary" id="decomposeBtn">⚡ Разобрать</button></div><div id="loadingBox" style="display:none"></div><div id="decompHistWrap"></div><div id="resultWrap"></div>`;
            renderDecompHistory(decomps);
            if (decomps.length) loadDecomp(decomps[0].id);
            $('editBtn').onclick = () => startEdit(req);
            $('decomposeBtn').onclick = () => runDecompose(req);
        }
        function renderDecompHistory(decomps) {
            const w = $('decompHistWrap'); if (!w) return;
            if (!decomps.length) { w.innerHTML = '<div style="color:var(--ink-faint);font-size:13.5px;margin-bottom:18px">Разборов ещё нет. Нажмите «Разобрать».</div>'; return; }
            w.innerHTML = '<div class="decomp-history"><div class="dh-label">История разборов</div>' + decomps.map(d => `<div class="dh-item${d.id === state.activeDecompId ? ' active' : ''}" data-id="${d.id}"><div class="dh-meta">${fmtDate(d.createdAt)}</div><div class="dh-counts">${d.stageCount} эт. · ${d.taskCount} зад.</div></div>`).join('') + '</div>';
            w.querySelectorAll('.dh-item').forEach(el => el.onclick = () => loadDecomp(+el.dataset.id));
        }
        async function startEdit(req) {
            await loadProjectOptions();
            const w = $('reqBodyWrap');
            w.innerHTML = `<div class="req-edit-form"><input id="editTitle" value="${esc(req.title)}"><textarea id="editBody">${esc(req.body)}</textarea><div class="image-import-row"><button type="button" class="btn btn-sm" id="editImageBtn">📎 Вставить скриншот</button><input id="editImageInput" type="file" accept="image/*" style="display:none" hidden></div><div id="editProjectPicker">${projectPickerHtml(req.projectIds)}</div><div class="req-edit-actions"><button class="btn btn-sm" id="editCancel">Отмена</button><button class="btn btn-sm btn-primary" id="editSave">Сохранить</button></div></div>`;
            bindImageExtract('editImageBtn', 'editImageInput', 'editBody');
            $('editCancel').onclick = () => { w.innerHTML = requirementProjectsHtml(req.projectIds) + '<div class="req-body-text">' + esc(req.body) + '</div>'; };
            $('editSave').onclick = async () => {
                const title = $('editTitle').value.trim(), body = $('editBody').value.trim();
                const projectIds = selectedProjectIds('editProjectPicker');
                if (!title || !body) { alert('Заполните оба поля.'); return; }
                try {
                    const r = await fetch('/api/requirements/' + req.id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, body, projectIds }) });
                    if (!r.ok) throw new Error('Ошибка');
                    await loadReqs(); openReq(req.id);
                } catch (e) { alert('Не удалось сохранить: ' + e.message); }
            };
        }
        async function openProjectsPage() {
            state.view = 'projects';
            state.activeReqId = null;
            state.activeDecompId = null;
            $('pushBtn').disabled = true;
            renderSidebar();
            $('main').innerHTML = '<div class="req-detail"><div class="req-detail-head"><h1>Проекты</h1><button class="btn btn-sm btn-primary" id="newProjectBtn">Новый проект</button></div><div id="projectListBox"><div class="empty-list">Загрузка…</div></div></div>';
            $('newProjectBtn').onclick = () => openProjectForm();
            await loadProjectsIntoPage();
        }
        async function loadProjectsIntoPage() {
            const box = $('projectListBox'); if (!box) return;
            try {
                const r = await fetch('/api/projects');
                const body = await r.json().catch(() => []);
                if (!r.ok) throw new Error(body.message || 'Ошибка сервера');
                state.projects = Array.isArray(body) ? body : [];
                renderProjectList(state.projects);
            } catch (e) {
                box.innerHTML = '<div class="empty-list">Не удалось загрузить проекты.</div>';
            }
        }
        function renderProjectList(projects) {
            const box = $('projectListBox'); if (!box) return;
            if (!projects.length) { box.innerHTML = '<div class="empty-list">Проектов ещё нет.</div>'; return; }
            box.innerHTML = '<div class="project-list">' + projects.map(p => `<div class="req-item" data-id="${p.id}"><div class="ri-title">${esc(p.name)}</div><div class="ri-meta"><span>${fmtDate(p.createdAt)}</span></div></div>`).join('') + '</div>';
            box.querySelectorAll('.req-item').forEach(el => el.onclick = () => openProject(+el.dataset.id));
        }
        async function openProject(id) {
            state.view = 'projects';
            state.activeReqId = null;
            state.activeDecompId = null;
            $('pushBtn').disabled = true;
            renderSidebar();
            try {
                const r = await fetch('/api/projects/' + id);
                const body = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(body.message || 'Ошибка сервера');
                renderProjectDetail(body);
            } catch (e) {
                $('main').innerHTML = '<div class="welcome"><div class="big">⚠</div><h2>Ошибка загрузки</h2></div>';
            }
        }
        function renderProjectDetail(project) {
            $('main').innerHTML = `<div class="req-detail"><div class="req-detail-head"><h1>${esc(project.name)}</h1><button class="btn btn-sm" id="editProjectBtn">Редактировать</button><button class="btn btn-sm" id="deleteProjectBtn">Удалить</button></div><div class="ri-meta" style="margin-bottom:10px"><span>создан ${fmtDate(project.createdAt)}</span></div><div class="req-body-text">${esc(project.description)}</div></div>`;
            $('editProjectBtn').onclick = () => openProjectForm(project);
            $('deleteProjectBtn').onclick = () => deleteProject(project);
        }
        function openProjectForm(project = null) {
            state.view = 'projects';
            state.activeReqId = null;
            state.activeDecompId = null;
            $('pushBtn').disabled = true;
            renderSidebar();
            const isEdit = !!project;
            $('main').innerHTML = `
                <div class="req-detail">
                  <div class="req-detail-head">
                    <h1>${isEdit ? 'Редактировать проект' : 'Новый проект'}</h1>
                  </div>
                  <div class="req-edit-form">
                    <input id="projectName" value="${escAttr(project?.name || '')}" placeholder="Название">
                    <textarea id="projectDescription" placeholder="Описание">${esc(project?.description || '')}</textarea>
                    <div class="req-edit-actions">
                      <button class="btn btn-sm" id="projectCancel">Отмена</button>
                      <button class="btn btn-sm btn-primary" id="projectSave">${isEdit ? 'Сохранить' : 'Создать проект'}</button>
                    </div>
                  </div>
                </div>
            `;
            $('projectCancel').onclick = () => isEdit ? openProject(project.id) : openProjectsPage();
            $('projectSave').onclick = async () => {
                const name = $('projectName').value.trim(), description = $('projectDescription').value.trim();
                if (!name || !description) { alert('Заполните название и описание.'); return; }
                try {
                    const r = await fetch('/api/projects' + (isEdit ? '/' + project.id : ''), { method: isEdit ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, description }) });
                    const body = await r.json().catch(() => ({}));
                    if (!r.ok) throw new Error(body.message || 'Ошибка сервера');
                    openProject(body.id);
                } catch (e) { alert('Не удалось сохранить проект: ' + e.message); }
            };
            $('projectName').focus();
        }
        async function deleteProject(project) {
            if (!confirm('Удалить проект "' + project.name + '"?')) return;
            try {
                const r = await fetch('/api/projects/' + project.id, { method: 'DELETE' });
                if (!r.ok) {
                    const body = await r.json().catch(() => ({}));
                    throw new Error(body.message || 'Ошибка сервера');
                }
                showToast('Проект удалён');
                openProjectsPage();
            } catch (e) { alert('Не удалось удалить проект: ' + e.message); }
        }
        async function runDecompose(req) {
            const lb = $('loadingBox'); if (!lb) return;
            lb.style.display = 'block';
            lb.innerHTML = '<div class="loading-box"><div class="spin"></div><div class="loading-snip">' + esc(req.body.slice(0, 140) + (req.body.length > 140 ? '…' : '')) + '</div><div class="loading-msg" id="lMsg">Перечитываю код репозитория…</div><div class="loading-elapsed" id="lEl">0:00</div><div style="font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:5px">обычно 1–2 минуты</div></div>';
            const db = $('decomposeBtn'); if (db) db.disabled = true;
            const msgs = ['Перечитываю код репозитория…', 'Понимаю архитектуру…', 'Раскладываю по этапам…', 'Собираю риски и привязки…'];
            let mi = 0;
            const tick = setInterval(() => { mi = (mi + 1) % msgs.length; const m = $('lMsg'); if (m) m.textContent = msgs[mi]; }, 2500);
            const t0 = Date.now();
            const clock = setInterval(() => { const el = $('lEl'); if (!el) return; const s = Math.floor((Date.now() - t0) / 1000); el.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }, 1000);
            try {
                const r = await fetch('/api/decompose', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ requirement: req.body, requirementId: req.id, projectIds: req.projectIds || [] }) });
                if (!r.ok) { const b = await r.json(); throw new Error(b.message || 'Ошибка сервера'); }
                const stored = await r.json();
                state.activeDecompId = stored.id;
                await loadReqs();
                const dd = await fetch('/api/requirements/' + req.id + '/decompositions');
                renderDecompHistory(await dd.json());
                renderResult(stored.result);
                $('pushBtn').disabled = false;
                const cnt = stored.result.stages.reduce((s, st) => s + (st.items?.length || 0), 0);
                showToast('Разбор готов <span class="tm">' + stored.result.stages.length + ' эт. · ' + cnt + ' зад.</span>');
            } catch (e) {
                if (lb) lb.innerHTML = '<div class="loading-box" style="background:var(--amber-tint);border-color:var(--amber)"><div style="color:var(--amber);font-family:var(--mono);font-size:13px">' + esc(e.message) + '</div></div>';
            } finally {
                clearInterval(tick); clearInterval(clock);
                const db2 = $('decomposeBtn'); if (db2) db2.disabled = false;
                if (lb) setTimeout(() => { if (lb.style) lb.style.display = 'none'; }, 3000);
            }
        }
        async function loadDecomp(id) {
            state.activeDecompId = id;
            document.querySelectorAll('.dh-item').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
            try {
                const r = await fetch('/api/decompositions/' + id);
                const stored = await r.json();
                renderResult(stored.result);
                $('pushBtn').disabled = false;
            } catch (e) { console.error(e); }
        }
        function renderResult(result) {
            const w = $('resultWrap'); if (!w) return;
            const stages = Array.isArray(result?.stages) ? result.stages : [];
            const risks = Array.isArray(result?.integrationRisks) ? result.integrationRisks : [];
            const clarifications = Array.isArray(result?.clarifications) ? result.clarifications : [];
            const techTags = new Set();
            let total = 0, sz = { S: 0, M: 0, L: 0 };
            const deckHtml = stages.map((st, si) => {
                const items = Array.isArray(st.items) ? st.items : [];
                const tasksHtml = items.map(t => {
                    total++; const s = sizeOf(t.size); sz[s]++;
                    const conf = sizeConfidenceOf(t.sizeConfidence);
                    const blockedBy = Array.isArray(t.blockedBy) ? t.blockedBy : [];
                    const cs = Array.isArray(t.considerations) ? t.considerations : [];
                    const ac = Array.isArray(t.acceptanceCriteria) ? t.acceptanceCriteria : [];
                    const dv = Array.isArray(t.devNotes) ? t.devNotes : [];
                    const taskTags = [...new Set(dv.map(parseDevNote).map(n => n.techTag).filter(Boolean))];
                    taskTags.forEach(tag => techTags.add(tag));
                    const blockedHtml = blockedBy.length ? '<div class="blocked-by">🔒 Зависит от: ' + blockedBy.map(esc).join(', ') + '</div>' : '';
                    return '<div class="task" data-tech-tags="' + escAttr(taskTags.join('|')) + '"><div class="thead"><span class="chip ' + s + '">' + s + '</span><span class="confidence confidence-' + conf.key + '">' + conf.label + '</span><span class="ttl">' + esc(t.title) + '</span><span class="chev">›</span></div>' + blockedHtml + '<div class="tbody"><div class="lay"><div class="lay-label">описание</div><div class="desc">' + esc(t.description || '') + '</div></div>' + (cs.length ? '<div class="lay"><div class="lay-label">что учесть</div><ul class="cons">' + cs.map(c => '<li>' + esc(c) + '</li>').join('') + '</ul></div>' : '') + (ac.length ? '<div class="lay"><div class="lay-label">критерии приёмки</div><ul class="cons acceptance">' + ac.map(c => '<li>' + esc(c) + '</li>').join('') + '</ul></div>' : '') + (dv.length ? '<button class="dev-toggle">⌄ для разработчика · ' + dv.length + '</button><div class="dev">' + dv.map(renderDevNote).join('') + '</div>' : '') + '</div></div>';
                }).join('');
                return '<div class="stage"><div class="node">' + pad(si + 1) + '</div><div class="stage-head"><div class="stage-title">' + esc(st.title) + '</div><div class="stage-count">' + items.length + ' зад.</div></div>' + tasksHtml + '</div>';
            }).join('');
            const filterHtml = '<div class="result-filter"><button class="active" data-tech="">Все</button>' + [...techTags].map(tag => '<button data-tech="' + escAttr(tag) + '">' + esc(tag) + '</button>').join('') + '</div>';
            const pdfButton = state.activeDecompId != null ? '<button class="btn btn-sm" id="exportPdfBtn">⬇ PDF</button>' : '';
            const clarificationsHtml = clarifications.length ? '<div class="panel attention"><h3>Вопросы к заказчику</h3>' + clarifications.map(q => '<div class="clarification"><span class="clarification-icon">?</span><div>' + esc(q) + '</div></div>').join('') + '</div>' : '';
            const risksHtml = risks.map(r => { const sev = riskSeverityOf(r?.severity); const affected = riskAffectedStagesOf(r); const affectedHtml = affected.length ? '<div class="risk-stages">Затрагивает: ' + affected.map(esc).join(', ') + '</div>' : ''; return '<div class="risk"><span class="risk-icon">!</span><div class="risk-body"><div class="risk-main"><span>' + esc(riskDescriptionOf(r)) + '</span><span class="risk-severity risk-severity-' + sev.key + '">' + sev.label + '</span></div>' + affectedHtml + '</div></div>'; }).join('') || '<div style="color:var(--ink-faint);font-size:13px">рисков не выделено</div>';
            w.innerHTML = '<div style="display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:14px"><div style="font-family:var(--mono);font-size:12px;color:var(--ink-soft)">' + stages.length + ' этапов · ' + total + ' задач · S ' + sz.S + ' / M ' + sz.M + ' / L ' + sz.L + '</div>' + pdfButton + '</div>' + filterHtml + '<div class="result-wrap"><div class="deck"><div class="spine"></div>' + deckHtml + '</div><aside class="rail"><div class="panel"><h3>Сквозные риски</h3>' + risksHtml + '</div>' + clarificationsHtml + '<div class="panel"><h3>В трекер</h3><div class="map">этап → <b>родит. задача</b><br>задача → <b>дочерняя</b><br>размер → <b>тег</b></div></div></aside></div>';
            const exportPdfBtn = $('exportPdfBtn');
            if (exportPdfBtn) exportPdfBtn.onclick = () => window.open('/api/decompositions/' + encodeURIComponent(state.activeDecompId) + '/export/pdf');
            w.querySelectorAll('.task').forEach(el => {
                el.querySelector('.thead').addEventListener('click', () => el.classList.toggle('open'));
                const dt = el.querySelector('.dev-toggle'); if (dt) dt.addEventListener('click', e => { e.stopPropagation(); el.classList.toggle('dev-open'); });
            });
            w.querySelectorAll('.result-filter button').forEach(btn => btn.addEventListener('click', () => {
                const tag = btn.dataset.tech || '';
                w.querySelectorAll('.result-filter button').forEach(x => x.classList.toggle('active', x === btn));
                w.querySelectorAll('.task').forEach(task => {
                    const tags = (task.dataset.techTags || '').split('|').filter(Boolean);
                    task.hidden = !!tag && !tags.includes(tag);
                });
                w.querySelectorAll('.stage').forEach(stage => {
                    stage.hidden = ![...stage.querySelectorAll('.task')].some(task => !task.hidden);
                });
            }));
        }
        document.querySelectorAll('#viewSeg button').forEach(b => b.addEventListener('click', () => {
            document.querySelectorAll('#viewSeg button').forEach(x => x.classList.remove('on'));
            b.classList.add('on'); document.body.classList.toggle('analyst', b.dataset.v === 'analyst');
        }));
        $('pushBtn').onclick = () => {
            if (!state.activeDecompId) return;
            $('modalSum').innerHTML = 'разбор <b>#' + state.activeDecompId + '</b><br>этапы → родительские задачи<br>задачи → дочерние с тегом размера';
            $('scrim').classList.add('on');
        };
        $('cancelPush').onclick = () => $('scrim').classList.remove('on');
        $('scrim').onclick = e => { if (e.target === $('scrim')) $('scrim').classList.remove('on'); };
        $('confirmPush').onclick = async () => {
            $('scrim').classList.remove('on');
            const btn = $('pushBtn'); btn.disabled = true; btn.textContent = 'Заливаю…';
            try {
                const r = await fetch('/api/decompositions/' + state.activeDecompId + '/push-to-tracker', { method: 'POST' });
                const body = await r.json();
                if (!r.ok) throw new Error(body.message || 'Ошибка трекера');
                showToast('Залито в трекер <span class="tm">' + body.epicsCreated + ' эт. · ' + body.tasksCreated + ' зад.</span>');
                if (state.activeReqId) await loadReqs();
            } catch (e) { alert('Не удалось залить:\n' + e.message); }
            finally { btn.disabled = false; btn.textContent = 'Залить в трекер'; }
        };
        loadReqs();
    </script>
</body>

</html>
